<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pluto QZ | 技术文章</title>
    <meta name="description" content="Pluto QZ 的单篇技术文章页面，聚焦大模型、智能体与计算机相关内容。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="notes.css">
</head>
<body class="note-view-page">
    <div class="notes-page">
        <header class="notes-topbar">
            <a class="notes-brand" href="index.html">Pluto QZ / 技术文章</a>
            <nav class="notes-nav">
                <a href="notes.html">文章目录</a>
                <a href="index.html">返回首页</a>
                <a href="https://github.com/plutoqz/plutoqz.github.io/tree/main/notes" target="_blank" rel="noreferrer">笔记源码目录</a>
            </nav>
        </header>

        <main class="note-layout">
            <section class="note-article-shell">
                <div class="note-meta-band">
                    <p class="eyebrow" id="note-category">正在载入</p>
                    <h1 id="note-title">正在读取文章...</h1>
                    <p id="note-summary">请稍等，页面正在载入文章内容。</p>
                    <div class="note-meta" id="note-meta"></div>
                </div>
                <article class="markdown-body" id="note-article" aria-live="polite"></article>
            </section>

            <aside class="note-sidebar">
                <section class="sidebar-card">
                    <p class="eyebrow">文章目录</p>
                    <h2>目录导航</h2>
                    <div class="toc-list" id="toc-list"></div>
                </section>
                <section class="sidebar-card">
                    <p class="eyebrow">延伸阅读</p>
                    <h2>继续阅读</h2>
                    <div class="related-list" id="related-list"></div>
                </section>
            </aside>
        </main>
    </div>

    <script src="assets/lib/marked.min.js"></script>
    <script src="notes-common.js"></script>
    <script src="note-view.js"></script>
</body>
</html>
