<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pluto QZ | 大模型与智能体文章目录</title>
    <meta name="description" content="Pluto QZ 的文章目录，聚焦大模型、智能体与计算机相关内容。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="notes.css">
</head>
<body>
    <div class="notes-page">
        <header class="notes-topbar">
            <a class="notes-brand" href="index.html">Pluto QZ / 文章目录</a>
            <nav class="notes-nav">
                <a href="index.html">返回首页</a>
                <a href="https://github.com/plutoqz/plutoqz.github.io/tree/main/notes" target="_blank" rel="noreferrer">笔记源码目录</a>
                <a href="https://github.com/plutoqz/plutoqz.github.io" target="_blank" rel="noreferrer">站点仓库</a>
            </nav>
        </header>

        <main>
            <section class="notes-hero">
                <div class="notes-hero-copy">
                    <p class="eyebrow">大模型 / 智能体 / 计算机</p>
                    <h1>文章目录</h1>
                    <p>
                        这里收拢当前仓库中的技术文章。你可以按专题浏览，
                        也可以直接搜索标题、摘要和标签，快速定位大模型、智能体和计算机相关内容。
                    </p>
                </div>
                <div class="notes-hero-panel">
                    <div class="notes-stat">
                        <span class="eyebrow">笔记数量</span>
                        <strong id="total-notes">0</strong>
                        <p>当前索引中的文章总数</p>
                    </div>
                    <div class="notes-stat">
                        <span class="eyebrow">专题数量</span>
                        <strong id="total-categories">0</strong>
                        <p>按目录聚合形成的专题</p>
                    </div>
                    <div class="notes-stat">
                        <span class="eyebrow">内容方向</span>
                        <strong>大模型 / 智能体</strong>
                        <p>当前文章主要围绕 Agent、LLM 应用和相关计算机知识展开。</p>
                    </div>
                </div>
            </section>

            <section class="notes-controls">
                <label class="search-box" for="notes-search">
                    <span>搜索文章</span>
                    <input id="notes-search" type="search" placeholder="输入标题、关键词或标签">
                </label>
                <div class="category-bar" id="category-bar" aria-live="polite"></div>
            </section>

            <section class="notes-list-section">
                <div class="notes-list-head">
                    <div>
                        <p class="eyebrow">专题浏览</p>
                        <h2 id="notes-result-title">全部文章</h2>
                    </div>
                    <p id="notes-result-meta">正在读取笔记清单...</p>
                </div>
                <div class="notes-grid" id="notes-grid" aria-live="polite"></div>
            </section>
        </main>
    </div>

    <script src="notes-common.js"></script>
    <script src="notes.js"></script>
</body>
</html>
